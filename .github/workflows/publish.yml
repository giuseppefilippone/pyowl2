name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # run only on version tags, e.g. v1.0.10
  workflow_dispatch:               # allow manual test/build runs (publish stays tag-gated)

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1) TEST across the OS/Python matrix using Poetry.
  #    The matrix verifies the code RUNS everywhere; it builds nothing.
  # ---------------------------------------------------------------------------
  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      # Install Poetry BEFORE setup-python. pipx is preinstalled on GitHub runners.
      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # To enable dependency caching, commit a poetry.lock and add: cache: poetry

      - name: Install dependencies
        # `env use python` pins the project venv to the matrix interpreter (not the
        # Python pipx installed Poetry with), so each matrix leg is meaningful.
        run: |
          poetry env use python
          poetry install --with dev

      - name: Run tests
        run: poetry run pytest

  # ---------------------------------------------------------------------------
  # 2) BUILD the sdist + wheel ONCE. Pure-Python output is OS/Python independent.
  # ---------------------------------------------------------------------------
  build:
    name: Build sdist + wheel
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: poetry build              # writes dist/*.whl and dist/*.tar.gz

      - name: Validate metadata (same check the publish step runs)
        run: pipx run twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: dist                   # a SINGLE artifact with a SINGLE set of files
          path: dist/

  # ---------------------------------------------------------------------------
  # 3) PUBLISH to PyPI via Trusted Publishing (OIDC).
  #    Guarded to tags so a manual workflow_dispatch tests/builds but never
  #    publishes unless run against a version tag.
  # ---------------------------------------------------------------------------
  pypi-publish:
    name: Publish to PyPI
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest             # gh-action-pypi-publish is Docker-based (Linux only)
    environment:
      name: pypi
      url: https://pypi.org/project/pyowl2/
    permissions:
      id-token: write                  # mandatory for Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: dist                   # exactly the one artifact built above — nothing to collide
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          print-hash: true