# .github/workflows/publish.yml
#
# Publishes PyOWL2 (a pure-Python package) to PyPI.
#
# WHY THIS REPLACES THE OLD WORKFLOW
# ----------------------------------
# PyOWL2 produces a single architecture-independent wheel:
#   pyowl2-<version>-py3-none-any.whl
# Building it on a 12-way (OS x Python) matrix created 12 artifacts that ALL
# contained that identical filename. `download-artifact` with
# `merge-multiple: true` unpacked them into one ./dist directory, so the same
# wheel path was written by several extractions at once and ended up corrupted,
# making `twine check` fail with:
#   zipfile.BadZipFile: Bad magic number for central directory
#
# A pure-Python project must build the wheel + sdist exactly ONCE. The matrix is
# kept only for running the test suite (where it adds value), not for building.
#
# Refs:
#   - https://github.com/pypa/gh-action-pypi-publish  (build once; multiple build
#     jobs only for C-extension projects)
#   - https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/

name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # publish only on version tags (e.g. v1.0.9)
  workflow_dispatch:               # allow manual triggering from the Actions tab

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1) TEST across the OS/Python matrix.
  #    This is the correct use of a matrix: verify the code RUNS everywhere.
  #    It does not build or upload any distribution artifacts.
  # ---------------------------------------------------------------------------
  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test dependencies
        # Adjust the extras name ([test]) to match your pyproject.toml.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest   # adjust to your actual test command

  # ---------------------------------------------------------------------------
  # 2) BUILD the distributions ONCE.
  #    A pure-Python project needs exactly one wheel (py3-none-any) and one sdist.
  #    Both are OS- and Python-version independent, so a single ubuntu job suffices.
  # ---------------------------------------------------------------------------
  build:
    name: Build sdist + wheel
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: pipx run build        # writes dist/*.whl and dist/*.tar.gz

      - name: Validate metadata (same check the publish action runs)
        run: pipx run twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: dist               # a SINGLE artifact with a SINGLE set of files
          path: dist/

  # ---------------------------------------------------------------------------
  # 3) PUBLISH to PyPI via Trusted Publishing (OIDC) - no API token needed.
  #    Prerequisites on PyPI: configure a Trusted Publisher for this repo +
  #    workflow filename, and create a GitHub environment named "pypi".
  #    (To use an API token instead, drop `id-token`/`environment` and pass
  #    `password: ${{ secrets.PYPI_API_TOKEN }}` to the publish step.)
  # ---------------------------------------------------------------------------
  pypi-publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyowl2/
    permissions:
      id-token: write              # mandatory for Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: dist               # download exactly the one artifact built above
          path: dist/
          # No merge-multiple: there is only one artifact, so nothing can collide.

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          # verify-metadata defaults to true; attestations are generated by
          # default under Trusted Publishing (gh-action-pypi-publish >= v1.11).